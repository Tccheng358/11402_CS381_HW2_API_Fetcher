name: Daily IP API Fetcher

on:
  schedule:
    - cron: '0 0 * * *' # Triggers automatically once a day at midnight UTC
  workflow_dispatch:    # Adds a button to let you trigger it manually!

jobs:
  run-api-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run API script
      env:
        IPSTACK_API_KEY: ${{ secrets.IPSTACK_API_KEY }}
      run: python api.py

    - name: Upload output JSON file
      uses: actions/upload-artifact@v4
      with:
        name: ip-geolocation-data
        path: ip_data.json
