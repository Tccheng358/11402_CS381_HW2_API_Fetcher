name: Daily IP API Fetcher

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-api-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run API script
      env:
        IPSTACK_API_KEY: ${{ secrets.IPSTACK_API_KEY }}
      run: python api.py

    - name: Upload output files
      uses: actions/upload-artifact@v4
      with:
        name: ip-geolocation-results
        path: ip_data* # This tells GitHub: "Find every file that starts with ip_data"
